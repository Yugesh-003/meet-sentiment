<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MeetMind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 340px; min-height: 200px; max-height: 520px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
    overflow-y: auto;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid #1e293b;
    background: #0f172a;
  }
  .header .logo { font-size: 22px; }
  .header .title { font-size: 15px; font-weight: 700; color: #a78bfa; }
  .header .mid {
    margin-left: auto; font-size: 10px; font-family: monospace;
    color: #64748b; background: #1e293b; padding: 3px 8px;
    border-radius: 999px;
  }

  /* Toggle row */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #1e293b;
    background: #1e293b40;
  }
  .toggle-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
    animation: pulse-glow 1.2s infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
    50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  }
  .toggle-label .off-text { color: #64748b; }

  /* Toggle switch */
  .switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #334155; border-radius: 999px;
    transition: .3s;
  }
  .slider::before {
    content: ''; position: absolute; width: 18px; height: 18px;
    left: 3px; bottom: 3px; background: #94a3b8; border-radius: 50%;
    transition: .3s;
  }
  .switch input:checked + .slider { background: #7c3aed; }
  .switch input:checked + .slider::before {
    transform: translateX(20px); background: #ffffff;
  }
  .switch input:disabled + .slider { opacity: .4; cursor: not-allowed; }

  /* Not on meet banner */
  .not-on-meet {
    padding: 24px 16px; text-align: center; color: #64748b; font-size: 13px;
  }
  .not-on-meet .icon { font-size: 32px; margin-bottom: 8px; }

  /* Participant list */
  .participants { padding: 8px 12px; }
  .card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: #1e293b; border-radius: 12px;
    margin-bottom: 6px;
  }
  .card .emoji { font-size: 28px; flex-shrink: 0; }
  .card .info { flex: 1; min-width: 0; }
  .card .name {
    font-size: 12px; font-weight: 600; color: #f1f5f9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .emotion-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .emotion-label { font-size: 11px; font-weight: 700; text-transform: capitalize; }
  .conf { font-size: 10px; color: #64748b; font-family: monospace; }
  .bar-bg {
    height: 4px; background: #334155; border-radius: 999px;
    margin-top: 4px; overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 999px; transition: width .4s; }

  /* Waiting / empty */
  .empty { padding: 20px; text-align: center; color: #475569; font-size: 12px; }

  /* Report button */
  .footer {
    padding: 10px 16px; border-top: 1px solid #1e293b;
  }
  .btn-report {
    display: block; width: 100%; padding: 10px;
    background: #7c3aed; color: #fff; border: none; border-radius: 10px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    text-align: center; transition: background .2s;
  }
  .btn-report:hover { background: #6d28d9; }
  .btn-report:disabled { opacity: .35; cursor: not-allowed; }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="logo">🧠</span>
    <span class="title">MeetMind</span>
    <span class="mid" id="meeting-id">—</span>
  </div>

  <!-- Not on Meet banner (shown when not on meet.google.com) -->
  <div class="not-on-meet" id="not-on-meet" style="display:none;">
    <div class="icon">🎥</div>
    Join a Google Meet to start
  </div>

  <!-- Toggle row -->
  <div class="toggle-row" id="toggle-row" style="display:none;">
    <div class="toggle-label" id="toggle-label">
      <span class="off-text">Click to start capturing</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Participant cards -->
  <div class="participants" id="participant-list"></div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-report" id="btn-report" disabled>View Full Report →</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
